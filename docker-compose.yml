version: '3.9'

services:
  api-server:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    container_name: inventario-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    env_file:
      - .env
    networks:
      - inventario-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 3s
      retries: 3

  inventario-ui:
    build:
      context: .
      dockerfile: artifacts/inventario-ui/Dockerfile
    container_name: inventario-ui
    ports:
      - "80:80"
    depends_on:
      api-server:
        condition: service_healthy
    networks:
      - inventario-network
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://api-server:3000

networks:
  inventario-network:
    driver: bridge
